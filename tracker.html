function updateDots() {
  [0,1,2,3,4,5].forEach(i => {
    const d = document.getElementById(`dot-${i}`);
    if (!d) return;
    d.style.background = i < pinValue.length ? '#a78bfa' : 'transparent';
    d.style.borderColor = i < pinValue.length ? '#a78bfa' : '#334155';
  });
}
function pinPress(n) { if (pinValue.length >= 6) return; pinValue += n; updateDots(); }
function pinClear() { pinValue = pinValue.slice(0,-1); updateDots(); }
async function pinSubmit() {
  if (pinValue.length < 4) {
    const e = document.getElementById('pin-error');
    if (e) { e.textContent = 'Mínimo 4 dígitos'; setTimeout(() => { if(e) e.textContent=''; }, 1500); }
    return;
  }
  const err = document.getElementById('pin-error');
  const btn = document.getElementById('pin-confirm');
  if (err) err.textContent = 'Verificando…';
  if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; }

  const { error } = await db.auth.signInWithPassword({ email: AUTH_EMAIL, password: pinValue });

  if (btn) { btn.disabled = false; btn.style.opacity = '1'; }

  if (error) {
    pinValue = ''; updateDots();
    if (err) { err.textContent = 'PIN incorrecto'; setTimeout(() => { if(err) err.textContent=''; }, 2000); }
  } else {
    isAuthenticated = true;
    view = 'dashboard';
    init();
  }
}

// ── DATA ─────────────────────────────────────────────
async function init() {
  const { data } = await db.from('tracker_products').select('*').order('fecha_inicio', { ascending: false });
  products = data || [];
  render();
}

async function saveProduct(formData) {
  let error;
  if (editingId) {
    ({ error } = await db.from('tracker_products').update(formData).eq('id', editingId));
  } else {
    ({ error } = await db.from('tracker_products').insert([formData]));
  }
  if (error) { alert('Error al guardar: ' + error.message); return; }
  editingId = null; selectedProduct = null;
  if (view === 'form') view = 'products';
  await init();
}

async function deleteProduct(id) {
  if (!confirm('¿Eliminar este producto? Esta acción no se puede deshacer.')) return;
  const { error } = await db.from('tracker_products').delete().eq('id', id);
  if (error) { alert('Error: ' + error.message); return; }
  selectedProduct = null; view = 'products';
  await init();
}

async function seedHistorical() {
  if (!confirm(`¿Importar ${SEED_DATA.length} productos históricos del CSV? Se añadirán a los existentes.`)) return;
  const { error } = await db.from('tracker_products').insert(SEED_DATA);
  if (error) { alert('Error al importar: ' + error.message); return; }
  alert('¡Histórico importado correctamente!');
  await init();
}

// ── FILTER ───────────────────────────────────────────
function getFiltered() {
  let res = [...products];
  if (filter.estado !== 'todos') res = res.filter(p => p.estado === filter.estado);
  if (filter.proveedor !== 'todos') res = res.filter(p => p.proveedor === filter.proveedor);
  if (filter.search) { const q = filter.search.toLowerCase(); res = res.filter(p => p.nombre.toLowerCase().includes(q) || (p.nicho||'').toLowerCase().includes(q) || (p.motivo_corte||'').toLowerCase().includes(q)); }
  if (sort === 'fecha_desc') res.sort((a,b)=>new Date(b.fecha_inicio||0)-new Date(a.fecha_inicio||0));
  else if (sort === 'fecha_asc') res.sort((a,b)=>new Date(a.fecha_inicio||0)-new Date(b.fecha_inicio||0));
  else if (sort === 'facturacion_desc') res.sort((a,b)=>(b.facturacion_bruta||0)-(a.facturacion_bruta||0));
  else if (sort === 'pedidos_desc') res.sort((a,b)=>(b.total_pedidos||0)-(a.total_pedidos||0));
  else if (sort === 'nota_desc') res.sort((a,b)=>(b.nota||0)-(a.nota||0));
  return res;
}

// ── CHARTS ────────────────────────────────────────────
function initCharts() {
  const tp = {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{ labels:{ color:'#64748b', font:{ family:'Inter', size:11 }, padding:10 } },
      tooltip:{ backgroundColor:'#0f0f1a', borderColor:'rgba(255,255,255,.1)', borderWidth:1, titleColor:'#e2e8f0', bodyColor:'#94a3b8', padding:10 }
    },
    scales:{
      x:{ ticks:{ color:'#64748b', font:{ family:'Inter', size:10 } }, grid:{ color:'rgba(255,255,255,.04)' }, border:{ color:'rgba(255,255,255,.04)' } },
      y:{ ticks:{ color:'#64748b', font:{ family:'Inter', size:10 } }, grid:{ color:'rgba(255,255,255,.04)' }, border:{ color:'rgba(255,255,255,.04)' } }
    }
  };

  // Revenue bar
  const sorted = [...products].sort((a,b)=>(b.facturacion_bruta||0)-(a.facturacion_bruta||0));
  const ctx1 = document.getElementById('chart-revenue');
  if (ctx1) chartInstances.revenue = new Chart(ctx1, {
    type:'bar',
    data:{
      labels: sorted.map(p=>p.nombre),
      datasets:[{ label:'Facturación (€)', data:sorted.map(p=>p.facturacion_bruta||0),
        backgroundColor: sorted.map(p=>p.estado==='activo'?'rgba(74,222,128,.65)':'rgba(167,139,250,.65)'),
        borderColor: sorted.map(p=>p.estado==='activo'?'#4ade80':'#a78bfa'),
        borderWidth:1, borderRadius:5 }]
    },
    options:{ ...tp, plugins:{...tp.plugins, legend:{display:false}} }
  });

  // Motivos doughnut
  const motivos = {};
  products.forEach(p=>{ if(p.motivo_corte) motivos[p.motivo_corte]=(motivos[p.motivo_corte]||0)+1; });
  const mLabels = Object.keys(motivos), mVals = Object.values(motivos);
  const palette = ['#a78bfa','#f472b6','#60a5fa','#4ade80','#fbbf24','#f87171','#34d399','#fb923c','#e879f9','#38bdf8'];
  const ctx3 = document.getElementById('chart-motivos');
  if (ctx3 && mLabels.length) chartInstances.motivos = new Chart(ctx3, {
    type:'doughnut',
    data:{ labels:mLabels, datasets:[{ data:mVals,
      backgroundColor:mLabels.map((_,i)=>palette[i%palette.length]+'bb'),
      borderColor:mLabels.map((_,i)=>palette[i%palette.length]),
      borderWidth:1, hoverOffset:6 }]
    },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{
      legend:{ position:'bottom', labels:{ color:'#64748b', font:{ family:'Inter', size:10 }, padding:8, boxWidth:10 } },
      tooltip:tp.plugins.tooltip
    }, cutout:'60%' }
  });

  // Orders bar top10
  const sortedOrd = [...products].sort((a,b)=>(b.total_pedidos||0)-(a.total_pedidos||0)).slice(0,10);
  const ctx2 = document.getElementById('chart-orders');
  if (ctx2) chartInstances.orders = new Chart(ctx2, {
    type:'bar',
    data:{ labels:sortedOrd.map(p=>p.nombre), datasets:[{ label:'Pedidos',
      data:sortedOrd.map(p=>p.total_pedidos||0),
      backgroundColor:'rgba(244,114,182,.65)', borderColor:'#f472b6', borderWidth:1, borderRadius:5 }]
    },
    options:{ ...tp, plugins:{...tp.plugins, legend:{display:false}} }
  });

  // Views by platform doughnut
  const plNames = ['TikTok','Instagram','YouTube','Facebook'];
  const plViews = [
    products.reduce((s,p)=>s+(p.tiktok_views||0),0),
    products.reduce((s,p)=>s+(p.instagram_views||0),0),
    products.reduce((s,p)=>s+(p.youtube_views||0),0),
    products.reduce((s,p)=>s+(p.facebook_views||0),0),
  ];
  const plColors = ['#00f2ea','#e1306c','#ff0000','#4267b2'];
  const ctx4 = document.getElementById('chart-views-platform');
  if (ctx4) chartInstances.viewsPlatform = new Chart(ctx4, {
    type:'doughnut',
    data:{ labels:plNames, datasets:[{ data:plViews,
      backgroundColor:plColors.map(c=>c+'bb'), borderColor:plColors, borderWidth:1, hoverOffset:6 }]
    },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{
      legend:{ position:'bottom', labels:{ color:'#64748b', font:{ family:'Inter', size:10 }, padding:8, boxWidth:10 } },
      tooltip:tp.plugins.tooltip
    }}
  });

  // €/Mill by platform bar
  const plRev = [
    products.reduce((s,p)=>s+(p.tiktok_facturacion||0),0),
    products.reduce((s,p)=>s+(p.instagram_facturacion||0),0),
    products.reduce((s,p)=>s+(p.youtube_facturacion||0),0),
    products.reduce((s,p)=>s+(p.facebook_facturacion||0),0),
  ];
  const eurMills = plNames.map((_,i)=>plViews[i]>0?(plRev[i]/(plViews[i]/1e6)).toFixed(2):0);
  const ctx5 = document.getElementById('chart-eurmill');
  if (ctx5) chartInstances.eurmill = new Chart(ctx5, {
    type:'bar',
    data:{ labels:plNames, datasets:[{ label:'€/Mill',
      data:eurMills,
      backgroundColor:plColors.map(c=>c+'bb'), borderColor:plColors, borderWidth:1, borderRadius:5 }]
    },
    options:{ ...tp, plugins:{...tp.plugins, legend:{display:false}} }
  });
}

// ── DETAIL ────────────────────────────────────────────
function showDetail(id) {
  selectedProduct = products.find(p=>p.id===id);
  view = 'detail';
  render();
}

function renderDetail() {
  const p = selectedProduct;
  if (!p) return '<div>No encontrado</div>';
  const dias = daysBetween(p.fecha_inicio, p.fecha_fin);
  const margenBruto = (p.precio_venta&&p.coste) ? ((p.precio_venta-p.coste)/p.precio_venta*100).toFixed(1) : null;
  const views = totalViews(p), factRedes = totalFactRedes(p);
  const em = views>0&&factRedes>0 ? (factRedes/(views/1e6)).toFixed(2) : null;
  const platforms = [
    { name:'TikTok', views:p.tiktok_views, fact:p.tiktok_facturacion, color:'#00f2ea', icon:'🎵' },
    { name:'Instagram', views:p.instagram_views, fact:p.instagram_facturacion, color:'#e1306c', icon:'📷' },
    { name:'YouTube', views:p.youtube_views, fact:p.youtube_facturacion, color:'#ff0000', icon:'▶️' },
    { name:'Facebook', views:p.facebook_views, fact:p.facebook_facturacion, color:'#4267b2', icon:'👍' },

  const infoRow = (label, val, color='#e2e8f0') => `<div><div style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">${label}</div><div style="font-size:15px;font-weight:700;color:${color}">${val||'—'}</div></div>`;

      </div>
      <div style="display:flex;gap:8px">
        <button onclick="startEdit('${p.id}')" style="padding:8px 16px;border-radius:10px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);color:#a78bfa;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">✏️ Editar</button>

        ${infoRow('Proveedor', esc(p.proveedor))}
        ${infoRow('Precio venta', p.precio_venta!=null?fmt(p.precio_venta,2)+'€':null)}
        ${infoRow('Coste', p.coste!=null?fmt(p.coste,2)+'€':null)}
        ${infoRow('Margen bruto', margenBruto?margenBruto+'%':null)}
        ${infoRow('Temporada', p.temporada?'Sí':'No')}
        ${infoRow('Días activo', dias?dias+'d':null)}
      </div>
    </div>

    <!-- Métricas -->
    <div class="card" style="margin-bottom:14px">
      ${sectionTitle('💰 Métricas de Ventas')}
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px">
        ${infoRow('Pedidos totales', fmt(p.total_pedidos), '#e2e8f0')}
        ${infoRow('Facturación bruta', p.facturacion_bruta!=null?fmt(p.facturacion_bruta,2)+'€':null, '#a78bfa')}
        ${infoRow('Beneficio neto', p.beneficio_neto!=null?fmt(p.beneficio_neto,2)+'€':null, '#4ade80')}
        ${infoRow('Sesiones web', p.sesiones_web?fmt(p.sesiones_web):null)}
        ${infoRow('Tasa conversión', p.tasa_conversion?p.tasa_conversion+'%':null)}
        ${infoRow('Devoluciones', p.devoluciones!=null?p.devoluciones+' uds':null)}
        ${infoRow('Día máx. facturación', esc(p.dia_max_facturacion))}
      </div>
    </div>

    <!-- Plataformas -->
    ${platforms.length>0?`
    <div class="card" style="margin-bottom:14px">
      ${sectionTitle('📊 Contenido & €/Mill por Plataforma')}
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="border-bottom:1px solid rgba(255,255,255,.06)">
            <th style="text-align:left;padding:8px 12px;color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase">Plataforma</th>
            <th style="text-align:right;padding:8px 12px;color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase">Views</th>
            <th style="text-align:right;padding:8px 12px;color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase">Facturación</th>
            <th style="text-align:right;padding:8px 12px;color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase">€/Mill</th>
          </tr></thead>
          <tbody>
            ${platforms.map(pl=>{
              const plEm = pl.views>0&&pl.fact>0?(pl.fact/(pl.views/1e6)).toFixed(2):'—';
              return `<tr style="border-bottom:1px solid rgba(255,255,255,.04)">
                <td style="padding:10px 12px"><span style="color:${pl.color}">${pl.icon}</span> <span style="font-weight:600;color:#e2e8f0">${pl.name}</span></td>
                <td style="padding:10px 12px;text-align:right;color:#64748b">${pl.views?fmt(pl.views):'—'}</td>
                <td style="padding:10px 12px;text-align:right;color:#a78bfa;font-weight:600">${pl.fact?fmt(pl.fact,2)+'€':'—'}</td>
                <td style="padding:10px 12px;text-align:right;color:#f472b6;font-weight:700">${plEm!=='—'?plEm+'€':'—'}</td>
              </tr>`;
            }).join('')}
            <tr style="border-top:1px solid rgba(255,255,255,.1)">
              <td style="padding:10px 12px;font-weight:700;color:#e2e8f0">TOTAL</td>
              <td style="padding:10px 12px;text-align:right;color:#e2e8f0;font-weight:700">${fmt(views)}</td>
              <td style="padding:10px 12px;text-align:right;color:#a78bfa;font-weight:800">${fmt(factRedes,2)}€</td>
              <td style="padding:10px 12px;text-align:right;color:#f472b6;font-weight:800">${em?em+'€':'—'}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`:''}

    <!-- Contenido -->
    ${(p.video_mejor||p.enfoque_no_funciono||p.cambios_contenido||p.facil_grabar)?`
    <div class="card" style="margin-bottom:14px">
      ${sectionTitle('🎬 Análisis de Contenido')}
      <div style="display:flex;flex-direction:column;gap:14px">
        ${qaRow('✅','¿Qué tipo de vídeo funcionó mejor?',p.video_mejor)}
        ${qaRow('❌','¿Qué enfoque NO funcionó?',p.enfoque_no_funciono)}
        ${qaRow('💭','¿Qué cambiarías en el contenido?',p.cambios_contenido)}
        ${qaRow('📹','¿El producto era fácil de grabar?',p.facil_grabar)}
      </div>
    </div>`:''}

    <!-- Diagnóstico -->
    ${(p.motivo_corte||p.que_funciono||p.que_replicarias||p.producto_o_contenido)?`
    <div class="card" style="margin-bottom:14px">
      ${sectionTitle('🔍 Diagnóstico Final')}
      <div style="display:flex;flex-direction:column;gap:14px">
        ${qaRow('✂️','¿Por qué lo cortaste?',p.motivo_corte)}
        ${qaRow('✅','¿Qué funcionó bien?',p.que_funciono)}
        ${qaRow('🔁','¿Qué replicarías en el siguiente?',p.que_replicarias)}
        ${qaRow('🤔','¿Fue el producto o el contenido el fallo?',p.producto_o_contenido)}
      </div>
    </div>`:''}

    <!-- Veredicto -->
    ${p.aprendizaje_clave?`
    <div style="background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(162,28,175,.12));border:1px solid rgba(167,139,250,.22);border-radius:16px;padding:24px;margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">⚡ Aprendizaje Clave</div>
      <div style="font-size:15px;color:#e2e8f0;line-height:1.7;font-weight:500">${esc(p.aprendizaje_clave)}</div>
    </div>`:''}

    <div style="height:40px"></div>
  </div>`;
}

// ── FORM ─────────────────────────────────────────────
function startEdit(id) {
  editingId = id;
  selectedProduct = products.find(p=>p.id===id);
  view = 'form';
  render();
}

function renderForm() {
  const p = editingId ? (selectedProduct||{}) : {};

  const inp = (id, label, type='text', val='') => `
    <div>
      <label style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px">${label}</label>
      <input id="${id}" type="${type}" value="${esc(val)}" />
    </div>`;

  const sel = (id, label, opts, val='') => `
    <div>
      <label style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px">${label}</label>
      <select id="${id}">${opts(val)}</select>
    </div>`;

  const ta = (id, label, val='') => `
    <div>
      <label style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px">${label}</label>
      <textarea id="${id}">${esc(val)}</textarea>
    </div>`;

  const grid = (cols, ...fields) => `<div style="display:grid;grid-template-columns:${cols};gap:14px">${fields.join('')}</div>`;
  const block = (title, ...rows) => `<div class="card" style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:18px">${title}</div>${rows.join('<div style="margin-top:14px"></div>')}</div>`;

  const v = p.estado||'activo', prov = p.proveedor||'';
  const rep = p.repetir||'', tmp = p.temporada?'true':'false';

  return `
  <div style="max-width:820px;margin:0 auto;padding:32px 28px" class="fade-in">
    <div style="margin-bottom:28px">
      <button onclick="${editingId?"view='detail';render()":"setView('products')"}" style="background:none;border:none;color:#64748b;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:8px;padding:0">← Volver</button>
      <h1 style="font-size:22px;font-weight:900;color:#e2e8f0">${editingId?'Editar producto':'Nuevo producto'}</h1>
    </div>

    ${block('📦 Info General',
      grid('repeat(auto-fit,minmax(200px,1fr))',
        inp('f-nombre','Nombre del producto','text',p.nombre||''),
        inp('f-nicho','Nicho','text',p.nicho||''),
        sel('f-proveedor','Proveedor',(cv)=>`
          <option value="" ${!prov?'selected':''}>Sin especificar</option>
          <option value="Aliexpress" ${prov==='Aliexpress'?'selected':''}>Aliexpress</option>
          <option value="Agente Privado" ${prov==='Agente Privado'?'selected':''}>Agente Privado</option>
          <option value="CJ Dropshipping" ${prov==='CJ Dropshipping'?'selected':''}>CJ Dropshipping</option>
          <option value="Otro" ${prov==='Otro'?'selected':''}>Otro</option>
        `),
        sel('f-estado','Estado',(cv)=>`
          <option value="activo" ${v==='activo'?'selected':''}>Activo</option>
          <option value="cortado" ${v==='cortado'?'selected':''}>Cortado</option>
        `),
        inp('f-fecha-inicio','Fecha inicio','date',p.fecha_inicio||''),
        inp('f-fecha-fin','Fecha fin / corte','date',p.fecha_fin||''),
        inp('f-precio','Precio venta (€)','number',p.precio_venta||''),
        inp('f-coste','Coste (€)','number',p.coste||''),
        sel('f-temporada','¿Temporada?',(cv)=>`
          <option value="false" ${tmp==='false'?'selected':''}>No</option>
          <option value="true" ${tmp==='true'?'selected':''}>Sí</option>
        `)
      )
    )}

    ${block('📊 Views & Facturación por Plataforma',
      grid('1fr 1fr',
        inp('f-tt-views','TikTok — Views','number',p.tiktok_views||''),
        inp('f-tt-fact','TikTok — Facturación (€)','number',p.tiktok_facturacion||''),
        inp('f-ig-views','Instagram — Views','number',p.instagram_views||''),
        inp('f-ig-fact','Instagram — Facturación (€)','number',p.instagram_facturacion||''),
        inp('f-yt-views','YouTube — Views','number',p.youtube_views||''),
        inp('f-yt-fact','YouTube — Facturación (€)','number',p.youtube_facturacion||''),
        inp('f-fb-views','Facebook — Views','number',p.facebook_views||''),
        inp('f-fb-fact','Facebook — Facturación (€)','number',p.facebook_facturacion||'')
      )
    )}

    ${block('💰 Métricas de Ventas',
      grid('repeat(auto-fit,minmax(200px,1fr))',
        inp('f-pedidos','Total pedidos','number',p.total_pedidos||''),
        inp('f-facturacion','Facturación bruta (€)','number',p.facturacion_bruta||''),
        inp('f-beneficio','Beneficio neto (€)','number',p.beneficio_neto||''),
        inp('f-sesiones','Sesiones web','number',p.sesiones_web||''),
        inp('f-conversion','Tasa conversión (%)','number',p.tasa_conversion||''),
        inp('f-devoluciones','Devoluciones (uds)','number',p.devoluciones||''),
        inp('f-dia-max','Día máx. facturación','text',p.dia_max_facturacion||'')
      )
    )}

    <div class="card" style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:18px">🎬 Análisis de Contenido</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        ${ta('f-video-mejor','¿Qué tipo de vídeo funcionó mejor?',p.video_mejor||'')}
        ${ta('f-enfoque-no','¿Qué enfoque NO funcionó?',p.enfoque_no_funciono||'')}
        ${ta('f-cambios','¿Qué cambiarías en el contenido?',p.cambios_contenido||'')}
        ${inp('f-facil-grabar','¿El producto era fácil de grabar?','text',p.facil_grabar||'')}
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:18px">🔍 Diagnóstico Final</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        ${inp('f-motivo','Motivo de corte','text',p.motivo_corte||'')}
        ${ta('f-funciono','¿Qué funcionó bien?',p.que_funciono||'')}
        ${ta('f-replicarias','¿Qué replicarías en el siguiente?',p.que_replicarias||'')}
        ${ta('f-prod-cont','¿Fue el producto o el contenido el fallo?',p.producto_o_contenido||'')}
      </div>
    </div>

    <div class="card" style="margin-bottom:28px">
      <div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:18px">⚡ Veredicto</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
        ${inp('f-nota','Nota (1-10)','number',p.nota||'')}
        ${sel('f-repetir','¿Repetirías?',(cv)=>`
          <option value="" ${!rep?'selected':''}>Sin responder</option>
          <option value="Sí" ${rep==='Sí'?'selected':''}>Sí</option>
          <option value="No" ${rep==='No'?'selected':''}>No</option>
        `)}
      </div>
      ${ta('f-aprendizaje','Aprendizaje clave',p.aprendizaje_clave||'')}
    </div>

    <div style="display:flex;gap:12px;justify-content:flex-end;padding-bottom:40px">
      <button onclick="${editingId?"view='detail';render()":"setView('products')"}" style="padding:12px 24px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#94a3b8;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Cancelar</button>
      <button onclick="submitForm()" style="padding:12px 28px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#a21caf);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">${editingId?'Guardar cambios':'Añadir producto'}</button>
    </div>
  </div>`;
}

function submitForm() {
  const g = id => { const el=document.getElementById(id); return el?el.value.trim():''; };
  const gn = id => { const v=g(id); return v===''?null:Number(v); };
  const nombre = g('f-nombre');
  if (!nombre) { alert('El nombre del producto es obligatorio'); return; }
  saveProduct({
    nombre, nicho:g('f-nicho')||null, proveedor:g('f-proveedor')||null, estado:g('f-estado')||'activo',
    fecha_inicio:g('f-fecha-inicio')||null, fecha_fin:g('f-fecha-fin')||null,
    precio_venta:gn('f-precio'), coste:gn('f-coste'), temporada:g('f-temporada')==='true',
    tiktok_views:gn('f-tt-views'), tiktok_facturacion:gn('f-tt-fact'),
    instagram_views:gn('f-ig-views'), instagram_facturacion:gn('f-ig-fact'),
    youtube_views:gn('f-yt-views'), youtube_facturacion:gn('f-yt-fact'),
    facebook_views:gn('f-fb-views'), facebook_facturacion:gn('f-fb-fact'),
    total_pedidos:gn('f-pedidos'), facturacion_bruta:gn('f-facturacion'),
    beneficio_neto:gn('f-beneficio'), sesiones_web:gn('f-sesiones'),
    tasa_conversion:gn('f-conversion'), devoluciones:gn('f-devoluciones'),
    dia_max_facturacion:g('f-dia-max')||null,
    video_mejor:g('f-video-mejor')||null, enfoque_no_funciono:g('f-enfoque-no')||null,
    cambios_contenido:g('f-cambios')||null, facil_grabar:g('f-facil-grabar')||null,
    motivo_corte:g('f-motivo')||null, que_funciono:g('f-funciono')||null,
    que_replicarias:g('f-replicarias')||null, producto_o_contenido:g('f-prod-cont')||null,
    nota:gn('f-nota'), repetir:g('f-repetir')||null, aprendizaje_clave:g('f-aprendizaje')||null,
  });
}

// ── BOOT ─────────────────────────────────────────────
(async function() {
  const { data } = await db.auth.getSession();
  if (data && data.session) {
    isAuthenticated = true;
    view = 'dashboard';
    init();
  } else {
    renderLogin();
  }
})();
</script>
</body>
</html>

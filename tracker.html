<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tracker de Productos — Samudrop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #08080f; color: #e2e8f0; font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="app">
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;font-size:16px;color:#64748b">Cargando…</div>
  </div>
  <script>
    // Este archivo solo contiene la pantalla de login.
    // El código de la aplicación se carga dinámicamente tras autenticarse.
    const AUTH_EMAIL   = 'samu@samudrop.com';
    const SUPABASE_URL = 'https://iofdeuwxlrefjjzdzbun.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvZmRldXd4bHJlZmpqemR6YnVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzA3MDgsImV4cCI6MjA5MTk0NjcwOH0.UO6aQu9LbfNkbg0HxwYV4byzsxDZPEdBf4OZFSwXOYc';
    const { createClient } = supabase;
    window.__db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let pinValue = '';

    // ── LOGIN UI ─────────────────────────────────────
    function renderLogin() {
      pinValue = '';
      document.getElementById('app').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#08080f">
        <div style="background:#0f0f1a;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:44px 40px;width:100%;max-width:380px;text-align:center">
          <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#a21caf);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px">📊</div>
          <h2 style="margin:0 0 4px;font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Tracker de Productos</h2>
          <p style="color:#64748b;font-size:13px;margin:0 0 28px">Introduce tu PIN para continuar</p>
          <div style="display:flex;gap:10px;justify-content:center;margin-bottom:20px" id="pin-dots">
            ${[0,1,2,3,4,5].map(i=>`<div id="dot-${i}" style="width:14px;height:14px;border-radius:50%;border:2px solid #334155;background:transparent;transition:all .2s"></div>`).join('')}
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px">
            ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="pinPress('${n}')" style="background:#161625;border:1px solid rgba(255,255,255,.07);color:#e2e8f0;font-size:1.3rem;font-weight:600;padding:18px;border-radius:12px;cursor:pointer;font-family:inherit">${n}</button>`).join('')}
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
            <button onclick="pinClear()" style="background:#161625;border:1px solid rgba(255,255,255,.07);color:#94a3b8;font-size:1rem;padding:18px;border-radius:12px;cursor:pointer;font-family:inherit">⌫</button>
            <button onclick="pinPress('0')" style="background:#161625;border:1px solid rgba(255,255,255,.07);color:#e2e8f0;font-size:1.3rem;font-weight:600;padding:18px;border-radius:12px;cursor:pointer;font-family:inherit">0</button>
            <button id="pin-confirm" onclick="pinSubmit()" style="background:linear-gradient(135deg,#7c3aed,#a21caf);border:none;color:#fff;font-size:1rem;padding:18px;border-radius:12px;cursor:pointer;font-family:inherit;transition:opacity .2s">✓</button>
          </div>
          <div id="pin-error" style="color:#f87171;font-size:13px;margin-top:16px;min-height:20px"></div>
          <a href="index.html" style="display:inline-block;margin-top:12px;color:#334155;font-size:12px;text-decoration:none">← Volver al inicio</a>
        </div>
      </div>`;
    }

    function updateDots() {
      [0,1,2,3,4,5].forEach(function(i) {
        var d = document.getElementById('dot-' + i);
        if (!d) return;
        d.style.background  = i < pinValue.length ? '#a78bfa' : 'transparent';
        d.style.borderColor = i < pinValue.length ? '#a78bfa' : '#334155';
      });
    }

    function pinPress(n) {
      if (pinValue.length >= 6) return;
      pinValue += n;
      updateDots();
    }

    function pinClear() {
      pinValue = pinValue.slice(0, -1);
      updateDots();
    }

    async function pinSubmit() {
      if (pinValue.length < 4) {
        var e = document.getElementById('pin-error');
        if (e) { e.textContent = 'Mínimo 4 dígitos'; setTimeout(function(){ if(e) e.textContent=''; }, 1500); }
        return;
      }
      var err = document.getElementById('pin-error');
      var btn = document.getElementById('pin-confirm');
      if (err) err.textContent = 'Verificando…';
      if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; }

      var result = await window.__db.auth.signInWithPassword({ email: AUTH_EMAIL, password: pinValue });

      if (btn) { btn.disabled = false; btn.style.opacity = '1'; }

      if (result.error) {
        pinValue = ''; updateDots();
        if (err) { err.textContent = 'PIN incorrecto'; setTimeout(function(){ if(err) err.textContent=''; }, 2000); }
      } else {
        loadApp();
      }
    }

    // ── CARGA DINÁMICA DE LA APP ──────────────────────
    // tracker-app.js solo se descarga al navegador tras autenticarse.
    function loadApp() {
      document.getElementById('app').innerHTML =
        '<div style="display:flex;justify-content:center;align-items:center;height:100vh;font-size:16px;color:#64748b">Cargando…</div>';

      // Cargar Chart.js primero, luego la app
      var chartScript = document.createElement('script');
      chartScript.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
      chartScript.onload = function() {
        var appScript = document.createElement('script');
        appScript.src = 'tracker-app.js';
        appScript.onerror = function() {
          document.getElementById('app').innerHTML =
            '<div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#f87171">Error al cargar la aplicación.</div>';
        };
        document.body.appendChild(appScript);
      };
      document.body.appendChild(chartScript);
    }

    // ── TECLADO ──────────────────────────────────────
    document.addEventListener('keydown', function(e) {
      if (/^[0-9]$/.test(e.key)) { pinPress(e.key); return; }
      if (e.key === 'Backspace')  { pinClear();      return; }
      if (e.key === 'Enter')      { pinSubmit();     return; }
    });

    // ── ARRANQUE ─────────────────────────────────────
    (async function() {
      var result = await window.__db.auth.getSession();
      if (result.data && result.data.session) {
        loadApp();
      } else {
        renderLogin();
      }
    })();
  </script>
</body>
</html>

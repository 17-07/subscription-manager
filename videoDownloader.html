<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Descargador de Vídeos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0a0c;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .container {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* Header */
  .header { text-align: center; }
  .header-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(14,165,233,.2), rgba(6,182,212,.1));
    border: 1px solid rgba(14,165,233,.25);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 1.6rem;
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    background: linear-gradient(135deg, #0ea5e9, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 13px;
    color: #475569;
  }

  /* Card */
  .card {
    background: #0d0d10;
    border: 1px solid #1e293b;
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* URL Input */
  .input-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 0 14px;
    height: 52px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within {
    border-color: rgba(14,165,233,0.5);
    background: rgba(14,165,233,0.04);
  }

  .platform-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .platform-badge.hidden { display: none; }
  .platform-badge.tiktok { color: #fe2c55; }
  .platform-badge.instagram { color: #e1306c; }

  .badge-sep {
    width: 1px;
    height: 18px;
    background: rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .badge-sep.hidden { display: none; }

  .url-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #e2e8f0;
    font-size: 14px;
    font-family: inherit;
    min-width: 0;
  }
  .url-input::placeholder { color: rgba(255,255,255,0.2); }

  .clear-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.2);
    font-size: 16px;
    line-height: 1;
    padding: 4px;
    border-radius: 6px;
    flex-shrink: 0;
    transition: color 0.15s;
    display: none;
  }
  .clear-btn.visible { display: block; }
  .clear-btn:hover { color: rgba(255,255,255,0.6); }

  /* Download button */
  .btn-download {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, #0ea5e9, #22d3ee);
    color: white;
    transition: filter 0.15s, opacity 0.15s;
  }
  .btn-download:hover:not(:disabled) { filter: brightness(1.1); }
  .btn-download:disabled { opacity: 0.45; cursor: not-allowed; filter: none; }

  /* States */
  .state { display: none; border-radius: 12px; padding: 16px; }
  .state.visible { display: flex; }

  /* Loading */
  .state-loading {
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(14,165,233,0.06);
    border: 1px solid rgba(14,165,233,0.15);
    color: #7dd3fc;
    font-size: 13px;
    font-weight: 500;
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(14,165,233,0.2);
    border-top-color: #0ea5e9;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Success */
  .state-success {
    flex-direction: column;
    gap: 14px;
    background: rgba(52,211,153,0.06);
    border: 1px solid rgba(52,211,153,0.2);
  }
  .success-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .success-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(52,211,153,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #34d399;
    font-size: 15px;
  }
  .success-text { flex: 1; }
  .success-text strong { display: block; font-size: 13px; font-weight: 700; color: #34d399; }
  .success-text span { font-size: 12px; color: #475569; }
  .btn-save {
    width: 100%;
    padding: 11px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    background: linear-gradient(135deg, #059669, #34d399);
    color: white;
    transition: filter 0.15s;
    text-decoration: none;
  }
  .btn-save:hover { filter: brightness(1.1); }

  /* Error */
  .state-error {
    align-items: flex-start;
    gap: 10px;
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.2);
  }
  .error-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(239,68,68,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #f87171;
    font-size: 13px;
    margin-top: 1px;
  }
  .error-text { flex: 1; }
  .error-text strong { display: block; font-size: 13px; font-weight: 700; color: #f87171; margin-bottom: 3px; }
  .error-text span { font-size: 12px; color: #64748b; line-height: 1.5; }

  /* Credits */
  .credits {
    text-align: center;
    font-size: 11px;
    color: #1e293b;
    letter-spacing: 0.04em;
  }
  .credits span {
    background: linear-gradient(135deg, #0ea5e9, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-icon">⬇️</div>
    <h1>Descargador de Vídeos</h1>
    <p>Descarga vídeos de TikTok e Instagram a máxima calidad y sin marca de agua</p>
  </div>

  <div class="card">

    <div class="input-wrap">
      <div class="platform-badge hidden" id="platform-badge"></div>
      <div class="badge-sep hidden" id="badge-sep"></div>
      <input
        type="url"
        id="url-input"
        class="url-input"
        placeholder="Pega aquí la URL del vídeo..."
        oninput="onUrlInput()"
        onpaste="setTimeout(onUrlInput, 0)"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="clear-btn" id="clear-btn" onclick="clearInput()" title="Borrar">✕</button>
    </div>

    <button class="btn-download" id="download-btn" onclick="startDownload()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg>
      Descargar vídeo
    </button>

    <div class="state state-loading" id="state-loading">
      <div class="spinner"></div>
      <span id="loading-text">Procesando vídeo...</span>
    </div>

    <div class="state state-success" id="state-success">
      <div class="success-top">
        <div class="success-icon">✓</div>
        <div class="success-text">
          <strong>Vídeo listo para descargar</strong>
          <span id="success-platform">Procesado correctamente</span>
        </div>
      </div>
      <a id="save-link" class="btn-save" href="#" download>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg>
        Guardar vídeo
      </a>
    </div>

    <div class="state state-error" id="state-error">
      <div class="error-icon">✕</div>
      <div class="error-text">
        <strong>No se pudo descargar</strong>
        <span id="error-msg">Ha ocurrido un error. Comprueba la URL e inténtalo de nuevo.</span>
      </div>
    </div>

  </div>

  <div class="credits">creado por <span>Samu</span></div>

</div>

<script>
  // ─── Configura aquí la URL base de tu API ───────────────────────────────────
  var API_URL = 'https://video-downloader-api-fjac.onrender.com';
  // ────────────────────────────────────────────────────────────────────────────

  var currentBlobUrl = null;

  var PLATFORMS = {
    tiktok: {
      label: 'TikTok',
      icon: '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>',
      className: 'tiktok',
      filename: 'tiktok-video.mp4'
    },
    instagram: {
      label: 'Instagram',
      icon: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>',
      className: 'instagram',
      filename: 'instagram-video.mp4'
    }
  };

  function detectPlatform(url) {
    if (url.includes('tiktok.com') || url.includes('vm.tiktok.com')) return 'tiktok';
    if (url.includes('instagram.com') || url.includes('instagr.am')) return 'instagram';
    return null;
  }

  function onUrlInput() {
    var val = document.getElementById('url-input').value.trim();
    var platform = detectPlatform(val);
    var badge = document.getElementById('platform-badge');
    var sep = document.getElementById('badge-sep');
    var clearBtn = document.getElementById('clear-btn');
    var downloadBtn = document.getElementById('download-btn');

    if (platform) {
      var p = PLATFORMS[platform];
      badge.innerHTML = p.icon + ' ' + p.label;
      badge.className = 'platform-badge ' + p.className;
      sep.className = 'badge-sep';
    } else {
      badge.className = 'platform-badge hidden';
      sep.className = 'badge-sep hidden';
    }

    clearBtn.className = val ? 'clear-btn visible' : 'clear-btn';
    downloadBtn.disabled = !platform;

    hideStates();
    if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
  }

  function clearInput() {
    document.getElementById('url-input').value = '';
    onUrlInput();
    document.getElementById('url-input').focus();
  }

  function hideStates() {
    document.getElementById('state-loading').className = 'state state-loading';
    document.getElementById('state-success').className = 'state state-success';
    document.getElementById('state-error').className = 'state state-error';
  }

  function showLoading(platform) {
    hideStates();
    var label = platform ? PLATFORMS[platform].label : 'vídeo';
    document.getElementById('loading-text').textContent = 'Procesando ' + label + '...';
    document.getElementById('state-loading').className = 'state state-loading visible';
  }

  function showSuccess(blobUrl, platform) {
    hideStates();
    currentBlobUrl = blobUrl;
    var filename = platform ? PLATFORMS[platform].filename : 'video.mp4';
    var label = platform ? 'Descargado desde ' + PLATFORMS[platform].label : 'Procesado correctamente';
    document.getElementById('success-platform').textContent = label;
    var link = document.getElementById('save-link');
    link.href = blobUrl;
    link.download = filename;
    document.getElementById('state-success').className = 'state state-success visible';
  }

  function showError(msg) {
    hideStates();
    document.getElementById('error-msg').textContent = msg || 'Ha ocurrido un error. Comprueba la URL e inténtalo de nuevo.';
    document.getElementById('state-error').className = 'state state-error visible';
  }

  async function startDownload() {
    var url = document.getElementById('url-input').value.trim();
    var platform = detectPlatform(url);
    if (!platform) return;

    var btn = document.getElementById('download-btn');
    btn.disabled = true;
    showLoading(platform);

    try {
      var response = await fetch(API_URL + '/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url })
      });

      if (!response.ok) {
        var errData = await response.json().catch(function() { return {}; });
        throw new Error(errData.error || 'Error ' + response.status + ' del servidor');
      }

      var contentType = response.headers.get('content-type') || '';
      if (contentType.startsWith('video/') || contentType === 'application/octet-stream') {
        var blob = await response.blob();
        var blobUrl = URL.createObjectURL(blob);
        showSuccess(blobUrl, platform);
      } else {
        var data = await response.json();
        if (data.error) throw new Error(data.error);
        throw new Error('Respuesta inesperada del servidor');
      }
    } catch (err) {
      showError(err.message);
    } finally {
      btn.disabled = false;
    }
  }
</script>

</body>
</html>

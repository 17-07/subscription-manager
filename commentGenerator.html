<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Generador de Reply TikTok</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0c; min-height: 100vh; display: flex; }
  .app { display: grid; grid-template-columns: 380px 1fr; width: 100%; min-height: 100vh; }

  /* LEFT */
  .left-panel { background: #0d0d10; border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; padding: 24px 20px; gap: 20px; overflow-y: auto; }

  .tool-title { margin-bottom: 4px; }
  .tool-title h2 {
    font-size: 1.25rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fe2c55, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }

  .section-label { font-size: 10px; font-weight: 600; color: #444; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .username-row { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 0 8px; height: 40px; color: #a78bfa; margin-bottom: 10px; }
  .username-row input { flex: 1; background: transparent; border: none; outline: none; color: white; font-size: 13px; font-weight: 500; font-family: inherit; min-width: 0; }
  .username-row input::placeholder { color: rgba(255,255,255,0.2); }
  .sep-v { width: 1px; height: 10px; background: rgba(255,255,255,0.12); flex-shrink: 0; }
  .icon-btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.35); padding: 4px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.15s; position: relative; flex-shrink: 0; }
  .icon-btn:hover { color: white; background: rgba(255,255,255,0.1); }
  .icon-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
  .icon-btn.active { color: #20d5ec; }
  .textarea-wrap { position: relative; margin-bottom: 14px; }
  .textarea-wrap textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px 12px 28px; color: white; font-size: 14px; font-family: inherit; line-height: 1.5; resize: none; outline: none; min-height: 110px; transition: border-color 0.2s, background 0.2s; }
  .textarea-wrap textarea:focus { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); }
  .textarea-wrap textarea::placeholder { color: rgba(255,255,255,0.3); }
  .char-count { position: absolute; bottom: 10px; right: 12px; font-size: 10px; color: rgba(255,255,255,0.25); font-weight: 500; pointer-events: none; }
  .export-row { display: flex; gap: 10px; }
  .btn-dl { flex: 1; padding: 14px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; background: linear-gradient(to right, #2563eb, #06b6d4); color: white; transition: filter 0.15s; }
  .btn-dl:hover { filter: brightness(1.12); }
  .btn-cp { flex: 1; padding: 14px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; background: linear-gradient(to right, #fe2c55, #a78bfa); color: white; transition: filter 0.15s; }
  .btn-cp:hover { filter: brightness(1.12); }

  .credits { margin-top: auto; padding-top: 16px; font-size: 11px; color: #333; text-align: center; letter-spacing: 0.04em; }
  .credits span { background: linear-gradient(135deg, #fe2c55, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }

  /* RIGHT */
  .right-panel { display: flex; align-items: center; justify-content: center; background: #0a0a0c; position: relative; padding: 60px 40px; }
  .glow { position: absolute; border-radius: 50%; pointer-events: none; filter: blur(80px); }
  .glow-1 { width: 500px; height: 500px; background: rgba(254,44,85,0.1); top: -80px; left: -80px; }
  .glow-2 { width: 400px; height: 400px; background: rgba(167,139,250,0.08); bottom: -60px; right: -60px; }

  /* BUBBLE */
  .bubble-outer { max-width: 380px; width: 100%; }
  .bubble-box { background: white; border-radius: 16px; border-bottom-left-radius: 0; padding: 20px 22px 24px; width: 100%; }
  .bubble-inner { display: flex; gap: 16px; align-items: flex-start; }
  .b-avatar { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; margin-top: 18px; overflow: hidden; background: #c8cdd4; display: flex; align-items: center; justify-content: center; }
  .b-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
  .b-content { flex: 1; min-width: 0; }
  .b-reply-line { font-size: 15px; font-weight: 600; color: #888; line-height: 1.3; display: flex; align-items: center; flex-wrap: wrap; gap: 0 4px; }
  .b-text { margin-top: 2px; font-size: 26px; font-weight: 700; color: #111; line-height: 1.2; letter-spacing: -0.01em; word-break: break-word; }
  .bubble-tail { display: block; margin-top: -1px; }
</style>
</head>
<body>
<div class="app">

  <!-- LEFT -->
  <div class="left-panel">
    <div class="tool-title">
      <h2>Generador de Reply TikTok</h2>
    </div>

    <div>
      <div class="section-label">Comment Controls</div>
      <div class="username-row">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <div class="sep-v"></div>
        <input type="text" id="username-input" value="username" placeholder="Display Name" oninput="update()" />
        <button class="icon-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m17 8-5-5-5 5"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg>
          <input type="file" accept="image/*" onchange="handleAvatar(event)" />
        </button>
        <button class="icon-btn" id="verified-btn" onclick="toggleVerified()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg>
        </button>
        <button class="icon-btn" onclick="randomIdentity()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.128a4 4 0 0 1 0 7.744"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/></svg>
        </button>
      </div>
      <div class="textarea-wrap">
        <textarea id="comment-input" rows="4" placeholder="Write your comment here..." oninput="update()">Write any comment and see what happens 😊</textarea>
        <div class="char-count" id="char-out">41 chars</div>
      </div>
      <div class="export-row">
        <button class="btn-dl" onclick="exportImg()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg>
          Download
        </button>
        <button class="btn-cp" onclick="copyImg()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
          Copiar
        </button>
      </div>
    </div>

    <div class="credits">creado por <span>Samu</span></div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="bubble-outer" id="export-target">
      <div class="bubble-box">
        <div class="bubble-inner">
          <div class="b-avatar" id="preview-avatar">
            <svg viewBox="0 0 50 50" fill="none" width="50" height="50">
              <circle cx="25" cy="25" r="25" fill="#c8cdd4"/>
              <circle cx="25" cy="19" r="9" fill="#8a9099"/>
              <ellipse cx="25" cy="42" rx="15" ry="10" fill="#8a9099"/>
            </svg>
          </div>
          <div class="b-content">
            <p class="b-reply-line">Reply to <span id="preview-username" style="margin:0 3px">username</span>'s comment</p>
            <div class="b-text" id="preview-text">Write any comment and see what happens 😊</div>
          </div>
        </div>
      </div>

      <svg class="bubble-tail" width="28" height="22" viewBox="0 0 54 44" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;margin-top:-2px;">
        <path d="M 0 0 L 0 2 L 54 2 L 54 0 Z" fill="white"/>
        <path d="M 0 2 L 0 30 Q 0 44 16 44 C 20 44 54 6 54 2 Z" fill="white"/>
      </svg>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  let verified = false;
  const names = ['alexmartinez_','sofia_rv','juancarlos22','pablohdz_','lauramv','miguelito_ok','cristinagb','iker_sports'];

  function update() {
    const u = document.getElementById('username-input').value || 'username';
    const c = document.getElementById('comment-input').value || '';
    document.getElementById('preview-username').textContent = u;
    document.getElementById('preview-text').textContent = c;
    document.getElementById('char-out').textContent = c.length + ' chars';
  }

  function handleAvatar(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('preview-avatar').innerHTML = '<img src="' + ev.target.result + '" />';
    };
    reader.readAsDataURL(file);
  }

  function toggleVerified() {
    verified = !verified;
    document.getElementById('verified-btn').classList.toggle('active', verified);
    const existing = document.getElementById('vbadge');
    if (existing) existing.remove();
    if (verified) {
      const badge = document.createElement('span');
      badge.id = 'vbadge';
      badge.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:#20d5ec;border-radius:50%;color:white;font-size:11px;font-weight:900;margin-left:4px;flex-shrink:0;vertical-align:middle';
      badge.textContent = '✓';
      document.getElementById('preview-username').after(badge);
    }
  }

  function randomIdentity() {
    const n = names[Math.floor(Math.random() * names.length)];
    document.getElementById('username-input').value = n;
    update();
  }

  async function exportImg() {
    const el = document.getElementById('export-target');
    const canvas = await html2canvas(el, { backgroundColor: '#0a0a0c', scale: 3, useCORS: true, logging: false });
    const link = document.createElement('a');
    link.download = 'tiktok-comment.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  async function copyImg() {
    const el = document.getElementById('export-target');
    const canvas = await html2canvas(el, { backgroundColor: '#0a0a0c', scale: 3, useCORS: true, logging: false });
    canvas.toBlob(blob => {
      try { navigator.clipboard.write([new ClipboardItem({'image/png': blob})]); alert('Copiado ✓'); }
      catch { alert('Usa Download en este navegador'); }
    });
  }
</script>
</body>
</html>
